; .user.ini — PHP-FPM per-directory settings for /q/
;
; Forces OPcache to check whether PHP files on disk have changed
; before using the cached bytecode.  Without this, shared hosts
; that set opcache.validate_timestamps=0 will silently serve stale
; compiled code even after you upload new/updated PHP files.
;
; PHP-FPM re-reads this file every user_ini.cache_ttl seconds
; (default 300 s).  Setting takes effect on the next reload cycle.

opcache.validate_timestamps = 1
opcache.revalidate_freq     = 0
